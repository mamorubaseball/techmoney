
<style>
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
*{box-sizing:border-box}
.map-wrap{padding:16px 0;font-family:var(--font-sans)}
.map-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.map-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px}
.sector-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.sector-card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;cursor:pointer;transition:border-color .15s,background .15s}
.sector-card:hover{background:var(--color-background-primary);border-color:var(--color-border-secondary)}
.sector-card.active{border-width:1.5px}
.sector-icon{font-size:22px;margin-bottom:6px}
.sector-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.sector-count{font-size:11px;color:var(--color-text-secondary)}
.sector-bar{height:3px;border-radius:2px;margin-top:8px;background:currentColor;opacity:.4}
.detail-panel{margin-top:20px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px;display:none}
.detail-panel.show{display:block}
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.detail-icon{font-size:24px}
.detail-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.detail-desc{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.company-tag{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:8px 10px;cursor:pointer;transition:border-color .15s}
.company-tag:hover{border-color:var(--color-border-secondary)}
.company-name{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.company-desc{font-size:11px;color:var(--color-text-secondary);line-height:1.3}
.amount-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-top:4px;font-weight:500}
.amt-mega{background:var(--color-background-danger);color:var(--color-text-danger)}
.amt-large{background:var(--color-background-warning);color:var(--color-text-warning)}
.amt-mid{background:var(--color-background-info);color:var(--color-text-info)}
.amt-small{background:var(--color-background-success);color:var(--color-text-success)}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;padding-top:12px;border-top:0.5px solid var(--color-border-tertiary)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.legend-dot{width:8px;height:8px;border-radius:2px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;text-align:center}
.stat-num{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
</style>

    <div class="legend-item"><div class="legend-dot" style="background:var(--color-background-success);border:1px solid var(--color-text-success)"></div>小型/非公開</div>

let active=null;
const grid=document.getElementById('sectors');
sectors.forEach(s=>{
  const card=document.createElement('div');
  card.className='sector-card';
  card.innerHTML=`<div class="sector-icon">${s.icon}</div>
    <div class="sector-name">${s.name}</div>
    <div class="sector-count">${s.count}社+</div>
    <div class="sector-bar" style="color:${s.color};width:${Math.min(100,s.count*8)}%"></div>`;
  card.style.borderLeftColor=s.color;
  card.addEventListener('click',()=>{
    if(active===s.id){
      active=null;
      card.classList.remove('active');
      document.getElementById('detail').classList.remove('show');
      return;
    }
    document.querySelectorAll('.sector-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    card.style.borderLeftWidth='3px';
    active=s.id;
    showDetail(s);
  });
  grid.appendChild(card);
});

function showDetail(s){
  document.getElementById('d-icon').textContent=s.icon;
  document.getElementById('d-title').textContent=s.name;
  document.getElementById('d-desc').textContent=s.desc;
  const cg=document.getElementById('d-companies');
  cg.innerHTML='';
  s.companies.forEach(c=>{
    const tag=document.createElement('div');
    tag.className='company-tag';
    tag.innerHTML=`<div class="company-name">${c.n}</div>
      <div class="company-desc">${c.d}</div>
      <span class="amount-badge amt-${c.a}">${{mega:'超大型$1B+',large:'大型$500M+',mid:'中型$100M+',small:'小型/非公開'}[c.a]}</span>`;
    tag.addEventListener('click',()=>sendPrompt(`NVIDIAの${c.n}への投資についてもっと詳しく教えて`));
    cg.appendChild(tag);
  });
  const panel=document.getElementById('detail');
  panel.style.borderLeftColor=s.color;
  panel.style.borderLeftWidth='3px';
  panel.classList.add('show');
}
</script>
